name = "modfolio-studio-app"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
# CF Workers Static Assets (migrated from CF Pages 2026-06-29).
# adapter-cloudflare auto-detects Workers mode from `main`/`assets` (no `pages_build_output_dir`).
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[observability.logs]
enabled = true
head_sampling_rate = 1

[vars]
PUBLIC_APP_URL = "https://lab.modfolio.io"
PUBLIC_LANDING_URL = "https://studio.modfolio.io"
