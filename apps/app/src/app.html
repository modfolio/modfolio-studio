<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#111118" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />

		<!-- Adobe Fonts — Studio Kit (Cinematic Contrast) -->
		<link rel="preconnect" href="https://use.typekit.net" crossorigin />
		<link rel="stylesheet" href="https://use.typekit.net/glw6csk.css" />

		<!-- Pretendard Variable (Korean fallback) -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
